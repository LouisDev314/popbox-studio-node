openapi: 3.1.0
info:
  title: Popbox Studio API
  version: 1.0.0
  description: >
    HTTP API for the Popbox Studio e-commerce backend. All response contracts are
    derived from the current implementation and Zod schemas in this repository.
servers:
  - url: http://localhost:3000
    description: Local development
tags:
  - name: Health
  - name: Webhooks
  - name: Home
  - name: Collections
  - name: Tags
  - name: Products
  - name: Search
  - name: Orders
  - name: Checkout
  - name: Admin Products
  - name: Admin Collections
  - name: Admin Tags
  - name: Admin Orders
  - name: Admin Customers
paths:
  /health:
    get:
      tags: [Health]
      summary: Readiness and database health check
      description: |
        Returns basic process uptime and verifies database connectivity.
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/HealthStatus'
        '503':
          $ref: '#/components/responses/ServiceUnavailableError'
  /api/v1/webhooks/stripe:
    post:
      tags: [Webhooks]
      summary: Stripe webhook receiver
      description: |
        Receives Stripe webhook events and updates orders and payments accordingly.
        Expects a raw JSON payload signed with Stripe's webhook secret.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Stripe event payload.
              additionalProperties: true
              # TODO: narrow schema if needed using Stripe's official OpenAPI spec
      responses:
        '200':
          description: Webhook processed or safely ignored
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/StripeWebhookResult'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/v1/home:
    get:
      tags: [Home]
      summary: Get homepage product sections
      description: |
        Returns curated product sections for the storefront homepage, including
        featured, trending, and preview items.
      responses:
        '200':
          description: Homepage data retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/HomepageData'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/v1/collections:
    get:
      tags: [Collections]
      summary: List active collections
      description: Returns all active product collections ordered by sort order.
      responses:
        '200':
          description: Collections retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/CollectionSummary'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/v1/tags:
    get:
      tags: [Tags]
      summary: List tags
      description: Returns all tags ordered by type and name.
      responses:
        '200':
          description: Tags retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/TagSummary'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/v1/products:
    get:
      tags: [Products]
      summary: List products
      description: |
        Returns a paginated list of active products with optional filters for
        collection, tag, type, and sort order.
      parameters:
        - name: limit
          in: query
          description: Maximum number of products to return (1–50).
          schema:
            type: integer
            minimum: 1
            maximum: 50
        - name: cursor
          in: query
          description: Opaque pagination cursor returned by a previous response.
          schema:
            type: string
        - name: collection
          in: query
          description: Collection slug to filter by.
          schema:
            type: string
        - name: tag
          in: query
          description: Tag slug to filter by.
          schema:
            type: string
        - name: type
          in: query
          description: Product type to filter by.
          schema:
            type: string
            enum: [standard, kuji]
        - name: sort
          in: query
          description: Sort mode for results.
          schema:
            type: string
            enum: [newest, price_asc, price_desc, name_asc, name_desc]
      responses:
        '200':
          description: Products retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ProductListPage'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/v1/products/{slug}:
    get:
      tags: [Products]
      summary: Get product by slug
      description: Returns full product details for an active product identified by slug.
      parameters:
        - name: slug
          in: path
          required: true
          description: Product slug.
          schema:
            type: string
      responses:
        '200':
          description: Product retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Product'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/v1/search:
    get:
      tags: [Search]
      summary: Search products
      description: Full-text search across active products.
      parameters:
        - name: q
          in: query
          required: true
          description: Search query (minimum 2 characters).
          schema:
            type: string
            minLength: 2
        - name: limit
          in: query
          description: Maximum number of results (1–50).
          schema:
            type: integer
            minimum: 1
            maximum: 50
      responses:
        '200':
          description: Search results retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ProductListPage'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/v1/search/autocomplete:
    get:
      tags: [Search]
      summary: Autocomplete product names
      description: Returns lightweight product suggestions for autocomplete.
      parameters:
        - name: q
          in: query
          required: true
          description: Search query (minimum 2 characters).
          schema:
            type: string
            minLength: 2
        - name: limit
          in: query
          description: Maximum number of suggestions (1–10).
          schema:
            type: integer
            minimum: 1
            maximum: 10
      responses:
        '200':
          description: Autocomplete suggestions retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ProductSuggestions'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/v1/orders/{publicId}/access:
    get:
      tags: [Orders]
      summary: Exchange guest order access token
      description: |
        Validates a guest order access token provided as a query parameter, header,
        or existing session cookie, then redirects to the client order URL.
      parameters:
        - name: publicId
          in: path
          required: true
          description: Public order ID.
          schema:
            type: string
        - name: token
          in: query
          required: false
          description: One-time guest order access token.
          schema:
            type: string
        - name: x-order-token
          in: header
          required: false
          description: One-time guest order access token (alternative to query param).
          schema:
            type: string
      responses:
        '302':
          description: Redirects to client order URL on success
          headers:
            Location:
              description: Client order URL.
              schema:
                type: string
                format: uri
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/v1/orders/{publicId}:
    get:
      tags: [Orders]
      summary: Get guest order
      description: |
        Returns a guest-safe view of an order. Requires a valid guest order
        session cookie established via the access endpoint.
      parameters:
        - name: publicId
          in: path
          required: true
          description: Public order ID.
          schema:
            type: string
      responses:
        '200':
          description: Order retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/GuestOrderDetail'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/v1/orders/{publicId}/tickets:
    get:
      tags: [Orders]
      summary: Get guest tickets summary
      description: |
        Returns all tickets for a guest order along with derived counts of
        revealed and unrevealed tickets.
      parameters:
        - name: publicId
          in: path
          required: true
          description: Public order ID.
          schema:
            type: string
      responses:
        '200':
          description: Order tickets retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/GuestTicketView'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/v1/orders/{publicId}/tickets/{ticketId}/reveal:
    post:
      tags: [Orders]
      summary: Reveal a single ticket
      description: Reveals a single kuji ticket for an eligible guest order.
      parameters:
        - name: publicId
          in: path
          required: true
          description: Public order ID.
          schema:
            type: string
        - name: ticketId
          in: path
          required: true
          description: Ticket UUID.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Ticket revealed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/OrderTicket'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/v1/orders/{publicId}/tickets/reveal-all:
    post:
      tags: [Orders]
      summary: Reveal all tickets
      description: Reveals all unrevealed tickets for an eligible guest order.
      parameters:
        - name: publicId
          in: path
          required: true
          description: Public order ID.
          schema:
            type: string
      responses:
        '200':
          description: All tickets revealed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/GuestTicketView'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/v1/checkout/session:
    post:
      tags: [Checkout]
      summary: Create checkout session
      description: |
        Creates an order, reserves inventory, and initializes a Stripe Checkout
        session. Requires an `Idempotency-Key` header to safely retry requests.
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          description: |
            Idempotency key for safely retrying checkout session creation.
            Must be a non-empty string up to 255 characters.
          schema:
            type: string
            maxLength: 255
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckoutRequest'
      responses:
        '201':
          description: Checkout session created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/CheckoutSession'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '422':
          $ref: '#/components/responses/UnprocessableEntityError'
        '429':
          $ref: '#/components/responses/RateLimitError'
        '502':
          $ref: '#/components/responses/BadGatewayError'
        '503':
          $ref: '#/components/responses/ServiceUnavailableError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/v1/checkout/success:
    get:
      tags: [Checkout]
      summary: Get checkout success details
      description: |
        Confirms a Stripe Checkout session has been paid and returns order
        details and guest access links.
      parameters:
        - name: session_id
          in: query
          required: true
          description: Stripe Checkout session ID.
          schema:
            type: string
      responses:
        '200':
          description: Checkout session verified
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/CheckoutSuccess'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '502':
          $ref: '#/components/responses/BadGatewayError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/v1/admin/products:
    get:
      tags: [Admin Products]
      summary: List products (admin)
      description: |
        Returns a paginated admin view of products. When a status filter is
        provided, this uses the same cursor semantics as the public product list.
      security:
        - AdminBearerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          description: Product status to filter by.
          schema:
            type: string
            enum: [draft, active, archived]
        - name: cursor
          in: query
          required: false
          description: Pagination cursor.
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: Maximum number of results (1–50).
          schema:
            type: integer
            minimum: 1
            maximum: 50
      responses:
        '200':
          description: Admin products retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ProductListPage'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags: [Admin Products]
      summary: Create product
      description: Creates a new product and initial inventory record.
      security:
        - AdminBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminProductCreate'
      responses:
        '201':
          description: Product created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Product'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '422':
          $ref: '#/components/responses/UnprocessableEntityError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/v1/admin/products/{id}:
    get:
      tags: [Admin Products]
      summary: Get product detail (admin)
      description: |
        Returns the full editable product detail for the admin product edit page,
        including description, tags, images, inventory, and collection data.
        Unlike the public product detail route, this does not restrict results
        to active products.
      security:
        - AdminBearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Product UUID.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Admin product retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Product'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'
    patch:
      tags: [Admin Products]
      summary: Update product
      description: Updates core product attributes and tags.
      security:
        - AdminBearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Product UUID.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminProductUpdate'
      responses:
        '200':
          description: Product updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Product'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/v1/admin/products/{id}/images:
    post:
      tags: [Admin Products]
      summary: Upload product images
      description: |
        Uploads one or more product images to storage and creates corresponding
        image records.
      security:
        - AdminBearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Product UUID.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                files:
                  type: array
                  items:
                    type: string
                    format: binary
                altTexts:
                  description: Optional alt text values, parallel to uploaded files.
                  type: array
                  items:
                    type: string
                    nullable: true
      responses:
        '201':
          description: Product images uploaded
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          images:
                            type: array
                            items:
                              $ref: '#/components/schemas/ProductImage'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '422':
          $ref: '#/components/responses/UnprocessableEntityError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/v1/admin/products/{id}/images/reorder:
    patch:
      tags: [Admin Products]
      summary: Reorder product images
      description: Updates the display order for a product's images.
      security:
        - AdminBearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Product UUID.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImageReorder'
      responses:
        '200':
          description: Product images reordered
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/ProductImage'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/v1/admin/products/{id}/images/{imageId}:
    delete:
      tags: [Admin Products]
      summary: Delete product image
      description: Removes a product image from storage and the database.
      security:
        - AdminBearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Product UUID.
          schema:
            type: string
            format: uuid
        - name: imageId
          in: path
          required: true
          description: Product image UUID.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Product image deleted
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          id:
                            type: string
                            format: uuid
                          deleted:
                            type: boolean
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/v1/admin/products/{id}/inventory:
    patch:
      tags: [Admin Products]
      summary: Update standard product inventory
      description: Updates on-hand and low-stock threshold for standard products.
      security:
        - AdminBearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Product UUID.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InventoryUpdate'
      responses:
        '200':
          description: Inventory updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ProductInventory'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '422':
          $ref: '#/components/responses/UnprocessableEntityError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/v1/admin/products/{id}/kuji-prizes:
    get:
      tags: [Admin Products]
      summary: List kuji prizes
      description: Lists all kuji prizes for a kuji product.
      security:
        - AdminBearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Kuji product UUID.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Kuji prizes retrieved
          content:
            application/json:
