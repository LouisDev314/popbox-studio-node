components:
  securitySchemes:
    AdminBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        Supabase access token for an authenticated admin user. Token is validated
        against the Supabase JWKS and the associated user must exist with
        role `admin`.
  schemas:
    ApiResponse:
      type: object
      description: Standard response envelope used by all JSON responses.
      properties:
        code:
          type: integer
          description: HTTP status code.
          minimum: 100
          maximum: 599
        success:
          type: boolean
          description: Indicates whether the request was successful.
        message:
          type: string
          description: Human-readable message.
        requestId:
          type: string
          description: Per-request correlation identifier.
        data:
          description: Response payload for successful responses.
        errors:
          description: Error payload for unsuccessful responses.
      additionalProperties: false
    ErrorResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          required: [code, success, message]
          properties:
            success:
              type: boolean
              enum: [false]
            errors:
              description: Error details; may include validation data.
              type: object
              additionalProperties: true
    RateLimitErrorBody:
      type: object
      description: Rate limit error body returned by the rate limiter.
      properties:
        ok:
          type: boolean
        error:
          type: string
      required: [ok, error]
      additionalProperties: false
    HealthStatus:
      type: object
      properties:
        uptime:
          type: number
          format: float
          description: Process uptime in seconds.
        timestamp:
          type: integer
          format: int64
          description: Milliseconds since UNIX epoch.
      required: [uptime, timestamp]
    StripeWebhookResult:
      type: object
      properties:
        received:
          type: boolean
        duplicate:
          type: boolean
      required: [received, duplicate]
    CollectionSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        description:
          type: string
          nullable: true
        sortOrder:
          type: integer
        isActive:
          type: boolean
      required: [id, name, slug, sortOrder, isActive]
    TagSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        tagType:
          type: string
      required: [id, name, slug, tagType]
    ProductCollection:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
      required: [id, name, slug]
    ProductImage:
      type: object
      properties:
        id:
          type: string
          format: uuid
        storageKey:
          type: string
        altText:
          type: string
          nullable: true
        sortOrder:
          type: integer
        url:
          type: string
          format: uri
      required: [id, storageKey, sortOrder, url]
    ProductInventory:
      type: object
      properties:
        onHand:
          type: integer
        reserved:
          type: integer
        available:
          type: integer
        lowStockThreshold:
          type: integer
      required: [onHand, reserved, available, lowStockThreshold]
    ProductTag:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        tagType:
          type: string
      required: [id, name, slug, tagType]
    KujiPrize:
      type: object
      properties:
        id:
          type: string
          format: uuid
        prizeCode:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        imageUrl:
          type: string
          format: uri
          nullable: true
        initialQuantity:
          type: integer
        remainingQuantity:
          type: integer
        sortOrder:
          type: integer
      required: [id, prizeCode, name, initialQuantity, remainingQuantity, sortOrder]
    ProductCard:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        description:
          type: string
          nullable: true
        productType:
          type: string
          enum: [standard, kuji]
        status:
          type: string
          enum: [draft, active, archived]
        priceCents:
          type: integer
        currency:
          type: string
        collection:
          allOf:
            - $ref: '#/components/schemas/ProductCollection'
          nullable: true
        images:
          type: array
          items:
            $ref: '#/components/schemas/ProductImage'
        inventory:
          allOf:
            - $ref: '#/components/schemas/ProductInventory'
          nullable: true
      required:
        - id
        - name
        - slug
        - productType
        - status
        - priceCents
        - currency
        - images
    Product:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        description:
          type: string
          nullable: true
        productType:
          type: string
          enum: [standard, kuji]
        status:
          type: string
          enum: [draft, active, archived]
        priceCents:
          type: integer
        currency:
          type: string
        sku:
          type: string
          nullable: true
        collection:
          allOf:
            - $ref: '#/components/schemas/ProductCollection'
          nullable: true
        images:
          type: array
          items:
            $ref: '#/components/schemas/ProductImage'
        tags:
          type: array
          items:
            $ref: '#/components/schemas/ProductTag'
        inventory:
          allOf:
            - $ref: '#/components/schemas/ProductInventory'
          nullable: true
        kujiPrizes:
          type: array
          items:
            $ref: '#/components/schemas/KujiPrize'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - slug
        - productType
        - status
        - priceCents
        - currency
        - images
        - tags
        - kujiPrizes
        - createdAt
        - updatedAt
    ProductListPage:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ProductCard'
        nextCursor:
          type: string
          nullable: true
      required: [items, nextCursor]
    ProductSuggestion:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        thumbnailUrl:
          type: string
          format: uri
          nullable: true
        priceCents:
