openapi: 3.0.3
info:
  title: Popbox Studio Backend
  version: 1.0.0
  description: Backend-only API contract for the mounted Popbox Studio routes.
servers:
  - url: "{{baseUrl}}"
    description: Local or deployed backend base URL
tags:
  - name: Health
  - name: Catalog
  - name: Checkout
  - name: Orders
  - name: Admin Catalog
  - name: Admin Orders
  - name: Webhooks
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    OrderTokenHeader:
      name: x-order-token
      in: header
      required: false
      schema:
        type: string
      description: Guest order access token. May also be supplied as a `token` query parameter.
    OrderTokenQuery:
      name: token
      in: query
      required: false
      schema:
        type: string
      description: Guest order access token. May also be supplied as an `x-order-token` header.
  schemas:
    SuccessResponse:
      type: object
      properties:
        code:
          type: integer
          example: 200
        success:
          type: boolean
          example: true
        message:
          type: string
        requestId:
          type: string
        data:
          nullable: true
    ErrorResponse:
      type: object
      properties:
        code:
          type: integer
          example: 400
        success:
          type: boolean
          example: false
        message:
          type: string
        requestId:
          type: string
        errors:
          nullable: true
    AddressInput:
      type: object
      required: [fullName, line1, city, province, postalCode, countryCode]
      properties:
        fullName:
          type: string
        line1:
          type: string
        line2:
          type: string
          nullable: true
        city:
          type: string
        province:
          type: string
        postalCode:
          type: string
        countryCode:
          type: string
          minLength: 2
          maxLength: 2
        phone:
          type: string
          nullable: true
    CheckoutSessionRequest:
      type: object
      required: [email, items, shippingAddress]
      properties:
        email:
          type: string
          format: email
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        billingSameAsShipping:
          type: boolean
        items:
          type: array
          minItems: 1
          items:
            type: object
            required: [productId, quantity]
            properties:
              productId:
                type: string
                format: uuid
              quantity:
                type: integer
                minimum: 1
                maximum: 20
        shippingAddress:
          $ref: "#/components/schemas/AddressInput"
        billingAddress:
          allOf:
            - $ref: "#/components/schemas/AddressInput"
          nullable: true
    AdminOrderStatusUpdateRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum:
            - pending_payment
            - paid
            - packed
            - shipped
            - cancelled
            - refunded
            - paid_needs_attention
            - expired
    ShipmentUpdateRequest:
      type: object
      properties:
        carrierName:
          type: string
          nullable: true
        trackingNumber:
          type: string
          nullable: true
        trackingUrl:
          type: string
          format: uri
          nullable: true
        shippedAt:
          type: string
          format: date-time
          nullable: true
        deliveredAt:
          type: string
          format: date-time
          nullable: true
    RefundRequest:
      type: object
      properties:
        reason:
          type: string
          nullable: true
  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Authentication is missing or invalid
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Authenticated caller is not allowed to perform the action
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Requested resource was not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Request conflicts with current resource state
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unprocessable:
      description: Request is syntactically valid but rejected by business rules
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
  /v1/home:
    get:
      tags: [Catalog]
      summary: Homepage product groups
      responses:
        "200":
          description: Homepage data retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
  /v1/collections:
    get:
      tags: [Catalog]
      summary: List active collections
      responses:
        "200":
          description: Active collections retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
  /v1/tags:
    get:
      tags: [Catalog]
      summary: List tags
      responses:
        "200":
          description: Tags retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
  /v1/products:
    get:
      tags: [Catalog]
      summary: List active products
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 50
        - name: cursor
          in: query
          schema:
            type: string
        - name: collection
          in: query
          schema:
            type: string
        - name: tag
          in: query
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
            enum: [standard, kuji]
        - name: sort
          in: query
          schema:
            type: string
            enum: [newest, price_asc, price_desc, trending]
      responses:
        "200":
          description: Products retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
  /v1/products/{slug}:
    get:
      tags: [Catalog]
      summary: Get active product by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Product retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/search:
    get:
      tags: [Catalog]
      summary: Search active products
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 2
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 50
      responses:
        "200":
          description: Search results retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
  /v1/checkout/session:
    post:
      tags: [Checkout]
      summary: Create Stripe checkout session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckoutSessionRequest"
      responses:
        "201":
          description: Checkout session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/Unprocessable"
        "502":
          description: Upstream checkout provider failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/checkout/success:
    get:
      tags: [Checkout]
      summary: Read checkout result after webhook finalization
      description: |
        This endpoint reads Stripe checkout session state and the persisted order state.
        It does not finalize inventory, payments, or kuji allocation; Stripe webhooks remain the source of truth.
      parameters:
        - name: session_id
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Checkout session verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /v1/orders/{publicId}:
    get:
      tags: [Orders]
      summary: Get guest order
      parameters:
        - name: publicId
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/OrderTokenHeader"
        - $ref: "#/components/parameters/OrderTokenQuery"
      responses:
        "200":
          description: Order retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /v1/orders/{publicId}/tickets:
    get:
      tags: [Orders]
      summary: Get guest order tickets
      parameters:
        - name: publicId
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/OrderTokenHeader"
        - $ref: "#/components/parameters/OrderTokenQuery"
      responses:
        "200":
          description: Order tickets retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /v1/orders/{publicId}/tickets/{ticketId}/reveal:
    post:
      tags: [Orders]
      summary: Reveal a single ticket
      parameters:
        - name: publicId
          in: path
          required: true
          schema:
            type: string
        - name: ticketId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/OrderTokenHeader"
        - $ref: "#/components/parameters/OrderTokenQuery"
      responses:
        "200":
          description: Ticket revealed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/orders/{publicId}/tickets/reveal-all:
    post:
      tags: [Orders]
      summary: Reveal all tickets
      parameters:
        - name: publicId
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/OrderTokenHeader"
        - $ref: "#/components/parameters/OrderTokenQuery"
      responses:
        "200":
          description: All tickets revealed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /v1/admin/products:
    get:
      tags: [Admin Catalog]
      summary: List admin products
      security:
        - BearerAuth: []
      parameters:
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 50
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, active, archived]
      responses:
        "200":
          description: Admin products retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [Admin Catalog]
      summary: Create product
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "201":
          description: Product created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /v1/admin/products/{id}:
    patch:
      tags: [Admin Catalog]
      summary: Update product
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Product updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/admin/products/{id}/images:
    post:
      tags: [Admin Catalog]
      summary: Upload product image
      description: Accepts `image/jpeg`, `image/png`, `image/webp`, and `image/avif` up to 5 MB.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                altText:
                  type: string
      responses:
        "201":
          description: Product image uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/Unprocessable"
        "502":
          description: Storage provider failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Storage bucket is not provisioned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/admin/products/{id}/images/reorder:
    patch:
      tags: [Admin Catalog]
      summary: Reorder product images
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Product images reordered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/admin/products/{id}/images/{imageId}:
    delete:
      tags: [Admin Catalog]
      summary: Delete product image
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: imageId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Product image deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "502":
          description: Storage provider failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Storage bucket is not provisioned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/admin/products/{id}/inventory:
    patch:
      tags: [Admin Catalog]
      summary: Update standard product inventory
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Inventory updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/admin/products/{id}/kuji-prizes:
    get:
      tags: [Admin Catalog]
      summary: List kuji prizes
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Kuji prizes retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [Admin Catalog]
      summary: Create kuji prize
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "201":
          description: Kuji prize created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/admin/products/{id}/kuji-prizes/{prizeId}:
    patch:
      tags: [Admin Catalog]
      summary: Update kuji prize
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: prizeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Kuji prize updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Admin Catalog]
      summary: Delete kuji prize
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: prizeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Kuji prize deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/admin/collections:
    get:
      tags: [Admin Catalog]
      summary: List collections
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Collections retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [Admin Catalog]
      summary: Create collection
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "201":
          description: Collection created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /v1/admin/collections/{id}:
    patch:
      tags: [Admin Catalog]
      summary: Update collection
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Collection updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/admin/tags:
    get:
      tags: [Admin Catalog]
      summary: List tags
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Tags retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [Admin Catalog]
      summary: Create tag
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "201":
          description: Tag created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /v1/admin/tags/{id}:
    patch:
      tags: [Admin Catalog]
      summary: Update tag
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Tag updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/admin/orders:
    get:
      tags: [Admin Orders]
      summary: List orders
      security:
        - BearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum:
              - pending_payment
              - paid
              - packed
              - shipped
              - cancelled
              - refunded
              - paid_needs_attention
              - expired
        - name: cursor
          in: query
